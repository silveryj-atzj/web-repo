services:
  # --- GitHub Self-hosted Runner ---
  runner:
    image: myoung34/github-runner:latest
    container_name: lemp-github-runner
    restart: always
    environment:
      # 1. 替换为你的 GitHub 仓库地址
      REPO_URL: "https://github.com/silveryj-atzj/web-repo.git"
      # 2. 替换为你在 GitHub Actions 页面获取的 Token
      RUNNER_TOKEN: "ASHYNXHKHVOW5SVAOIXGRZTJXZW6U"
      RUNNER_NAME: "pve-lemp-runner"
      LABELS: "self-hosted,lemp-deploy"
    volumes:
      # 关键：让 Runner 容器能直接修改 nginx 容器挂载的代码目录
      - ./:/opt/stack-root
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lemp-network

  # --- PHP-FPM 核心服务 ---
  php:
    build:
      context: ./php
    container_name: lemp-php
    restart: always
    volumes:
      - ./www:/var/www/html
    networks:
      - lemp-network

  # --- Nginx Web服务器 ---
  nginx:
    image: nginx:latest
    container_name: lemp-nginx
    restart: always
    ports:
      - "8081:80"
      - "443:443"
    volumes:
      - ./www:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - lemp-network
    depends_on:
      - php

  # --- MySQL 数据库 ---
  mysql:
    image: mysql:8.0
    container_name: lemp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${rootPassword}
      MYSQL_DATABASE: ${database}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - lemp-network

  # --- phpMyAdmin 图形化管理界面 ---
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lemp-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - UPLOAD_LIMIT=64M
    networks:
      - lemp-network
    depends_on:
      - mysql

networks:
  lemp-network:
    driver: bridge

volumes:
  mysql_data:
