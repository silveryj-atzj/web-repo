name: Deploy LEMP Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 取消默认的持久化凭证，确保清理干净
          persist-credentials: false

      # 2. 同步全量文件（包含配置和 Compose 文件）
      - name: Sync Full Repo to Stack Root
        run: |
          echo "Starting full repository sync..."
          
          # 核心指令：
          # -a: 归档模式
          # -v: 显示详情
          # --delete: 确保删除仓库里已经删掉的文件
          # --exclude '.git/': 必须排除这个，否则会弄乱权限
          # ./: 代表当前仓库根目录
          # /opt/Webdev/: 指向 Runner 容器中挂载的宿主机 Stack 根目录
          
          sudo rsync -av --delete \
            --exclude '.git/' \
            --exclude 'runner/' \
            ./ /opt/WebDev/
          
          echo "Sync completed. All files including configs and docker-compose are updated."

      # 3. 自动应用配置更改（可选）
      # 如果你修改了 nginx 配置或 docker-compose.yml，通常需要 reload 或 restart 才会生效
      - name: Reload Nginx Configuration
        run: |
          # 只有当 lemp-nginx 容器正在运行时，此命令才会生效
          docker exec lemp-nginx nginx -s reload || echo "Nginx not running, skipping reload."
